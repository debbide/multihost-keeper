services:
  leme-bot:
    image: ghcr.io/debbide/leme-pro:latest
    container_name: leme-bot
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      # 只需这一行：将本地当前目录映射到容器的数据中心
      - .:/app/data
    environment:
      - TZ=Asia/Shanghai
      - SECRET_KEY=change-this-to-random-string
