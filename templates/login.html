<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - LemeBot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            background-attachment: fixed;
            position: relative;
            overflow: hidden;
        }
        body::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background:
                radial-gradient(circle at 20% 80%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(34, 197, 94, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(239, 68, 68, 0.08) 0%, transparent 40%);
            animation: float 20s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(30px, -30px) rotate(5deg); }
            66% { transform: translate(-20px, 20px) rotate(-5deg); }
        }
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow:
                0 8px 32px rgba(0, 0, 0, 0.3),
                inset 0 0 0 1px rgba(255, 255, 255, 0.05);
        }
        .glass-input {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        .glass-input:focus {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(59, 130, 246, 0.5);
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.2);
        }
        .glass-btn {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.8) 0%, rgba(99, 102, 241, 0.8) 100%);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }
        .glass-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 40px rgba(59, 130, 246, 0.4);
        }
        .glass-btn:disabled {
            opacity: 0.5;
            transform: none;
        }
        .logo-glow {
            text-shadow: 0 0 40px rgba(59, 130, 246, 0.5);
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">
    <div id="app" class="w-full max-w-md relative z-10">
        <div class="glass rounded-3xl p-8 md:p-10">
            <!-- Logo -->
            <div class="text-center mb-10">
                <div class="inline-flex items-center justify-center w-20 h-20 rounded-2xl glass mb-4">
                    <svg class="w-10 h-10 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M5 12h14M5 12a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v4a2 2 0 01-2 2M5 12a2 2 0 00-2 2v4a2 2 0 002 2h14a2 2 0 002-2v-4a2 2 0 00-2-2m-2-4h.01M17 16h.01"/>
                    </svg>
                </div>
                <h1 class="text-3xl font-bold text-white logo-glow">LemeBot</h1>
                <p class="text-gray-400 mt-2 text-sm">服务器自动续期管理系统</p>
            </div>

            <form @submit.prevent="login" class="space-y-6">
                <div>
                    <label class="block text-gray-300 text-sm font-medium mb-2 ml-1">用户名</label>
                    <input
                        v-model="username"
                        type="text"
                        class="glass-input w-full px-5 py-3.5 rounded-xl text-white placeholder-gray-500 focus:outline-none"
                        placeholder="请输入用户名"
                        required
                    >
                </div>

                <div>
                    <label class="block text-gray-300 text-sm font-medium mb-2 ml-1">密码</label>
                    <input
                        v-model="password"
                        type="password"
                        class="glass-input w-full px-5 py-3.5 rounded-xl text-white placeholder-gray-500 focus:outline-none"
                        placeholder="请输入密码"
                        required
                    >
                </div>

                <div v-if="error" class="glass p-4 rounded-xl border-red-500/30 bg-red-500/10">
                    <p class="text-red-400 text-sm text-center">{{ error }}</p>
                </div>

                <button
                    type="submit"
                    :disabled="loading"
                    class="glass-btn w-full py-4 text-white font-semibold rounded-xl focus:outline-none"
                >
                    <span v-if="loading" class="flex items-center justify-center gap-2">
                        <svg class="animate-spin w-5 h-5" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"/>
                        </svg>
                        登录中...
                    </span>
                    <span v-else>登 录</span>
                </button>
            </form>
        </div>

        <p class="text-center text-gray-500 text-xs mt-6">
            LemeBot v2.0 · 磨砂玻璃主题
        </p>
    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script>
        const { createApp, ref } = Vue

        createApp({
            setup() {
                const username = ref('')
                const password = ref('')
                const error = ref('')
                const loading = ref(false)

                const login = async () => {
                    error.value = ''
                    loading.value = true

                    try {
                        const res = await fetch('/api/login', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                username: username.value,
                                password: password.value
                            })
                        })

                        const data = await res.json()

                        if (data.success) {
                            window.location.href = '/'
                        } else {
                            error.value = data.error || '登录失败'
                        }
                    } catch (e) {
                        error.value = '网络错误，请重试'
                    } finally {
                        loading.value = false
                    }
                }

                return { username, password, error, loading, login }
            }
        }).mount('#app')
    </script>
</body>
</html>
